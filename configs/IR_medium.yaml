min_area: 150 #min area of worm in pixels
max_area: 700 #max area of worm in pixels
gap_range: 8 # max number of frame gap to link worms (i.e. can a worm disappear for more frames?)
thresh: None # if not 'None', then manual threshold - set to a number (see below) to use if too few worms detected or too many short tracks
min_thresh: null # override auto-computed noise floor (default: null = auto-detect from background frame std when backsub=true)
search_range: 30 # max pixel distance to link tracks across frames
min_length: 25 # minimum length of track in frames to keep
frame_rate: 10 # FPS - necessary for speed analysis and video writing
illumination: 0 # illumination source, 0 = white worms on dark (e.g. IR), 1 = dark worms on light. default 0
subsample: 1 # frames to keep (1/n frames), will speed up analysis of videos with a high frame rate if using centroid tracking
backsub: True # for IR illumination, this works much better
backsub_frames: 20 # number of evenly-spaced frames to subtract background
pixel_length: 60 # number of pixels/mm
speed_threshold: 0.03 # minimum speed to be considered moving (mm/sec)
min_displacement_for_angle: 0.001  # Ignore angle when moving < n mm between frames 

### these will not usually change ###
window_size: 3 # number of points to use for rolling angular motion statistics
direction_threshold: 1.57 # max change in direction standard deviation to be considered motion in a given direction (radians)
direction_change_threshold: 1.57 # minimum change in direction to call a reversal or pirouette (radians)
min_run_length: 5 # minimum run length to be considered a forward run (in frames)
smooth_positions: True # reduce position jittering due to high frame rates
smooth_window: 5 # window for smoothing (n_frames)
reversal_persistence: 3 # requires a large angle change to persist for n frames to be counted 
pirouette_speed_threshold: 0.1 # max speed to be considered a pirouette 0.1 mm/s (slightly slower than forward movement)
pirouette_eccentricity_threshold: 0.9 # body becomes rounder at lower values. Most worms are close to 1 during runs. 
min_pirouette_duration: 4 # minimum number of consecutive frames to call a pirouette
max_instantaneous_speed: 0.6 # Cap unrealistic speeds mm/sec
stability_threshold: 0.88 # Very strict stability requirement for movement angles changes 1 = no change in angle